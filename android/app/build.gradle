apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

react {
    autolinkLibrariesWithApp()
}

def versionMajor = rootProject.ext.versionMajor
def versionMinor = rootProject.ext.versionMinor
def versionPatch = rootProject.ext.versionPatch

def enableProguardInReleaseBuilds = false
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.buritv"

    defaultConfig {
        applicationId "com.buritv"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode versionMajor * 10000 + versionMinor * 100 + versionPatch
        versionName "${versionMajor}.${versionMinor}.${versionPatch}"
        multiDexEnabled true

        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a"
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    lintOptions {
        checkReleaseBuilds false
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
            pickFirst 'lib/arm64-v8a/libc++_shared.so'
            pickFirst 'lib/armeabi-v7a/libc++_shared.so'
            pickFirst 'lib/x86/libc++_shared.so'
            pickFirst 'lib/x86_64/libc++_shared.so'
        }
    }
}

tasks.whenTaskAdded((tas -> {
    if (tas.name.contains("merge") && tas.name.contains("NativeLibs")) {
        tasks.named(tas.name) {it
            doFirst {
                it.externalLibNativeLibs.getFiles().stream()
                    .forEach(file -> {
                        try {
                            java.nio.file.Files.walk(file.toPath()).forEach(path -> {
                                if (path.toString().contains("libc++_shared.so")) {
                                    try { java.nio.file.Files.deleteIfExists(path); }
                                    catch (Exception e) {}
                                }
                            });
                        } catch (Exception e) {}
                    });
            }
        }
    }
}))

def ndkCxxTriples = [
    "armeabi-v7a": "arm-linux-androideabi",
    "arm64-v8a" : "aarch64-linux-android",
    "x86" : "i686-linux-android",
    "x86_64" : "x86_64-linux-android"
]

def ndkHostTag = {
    def os = System.getProperty("os.name").toLowerCase()
    if (os.contains("win")) return "windows-x86_64"
    if (os.contains("mac")) return "darwin-x86_64"
    return "linux-x86_64"
}()

def resolveNdkDir = {
    try {
        def d = android.ndkDirectory
        if (d != null && d.exists()) return d
    } catch (Exception ignored) {}
    try {
        def ndkRoot = new File(android.sdkDirectory, "ndk")
        if (ndkRoot.exists()) {
            def candidates = ndkRoot.listFiles()?.findAll { it.isDirectory() }?.sort { it.name }
            if (candidates) return candidates.last()
        }
    } catch (Exception ignored) {}
    return null
}

tasks.register("bundleNdkLibcxx") {
    doLast {
        def ndkDir = resolveNdkDir()
        if (ndkDir == null) {
            throw new GradleException(
                "No se encontró ningún NDK instalado. Instala el NDK con:\n" +
                "  sdkmanager \"ndk;25.1.8937393\"\n" +
                "o desde Android Studio: SDK Manager > SDK Tools > NDK (Side by side).")
        }
        def sysrootLib = "${ndkDir}/toolchains/llvm/prebuilt/${ndkHostTag}/sysroot/usr/lib"
        def jniLibsDir = file("${projectDir}/src/main/jniLibs")
        ndkCxxTriples.each { abi, triple ->
            def src = file("${sysrootLib}/${triple}/libc++_shared.so")
            if (src.exists()) {
                def destDir = file("${jniLibsDir}/${abi}")
                destDir.mkdirs()
                java.nio.file.Files.copy(
                    src.toPath(),
                    new File(destDir, "libc++_shared.so").toPath(),
                    java.nio.file.StandardCopyOption.REPLACE_EXISTING)
                println "Bundled NDK libc++_shared.so for ${abi}"
            } else {
                println "WARNING: NDK libc++_shared.so not found at ${src}"
            }
        }
    }
}

tasks.configureEach { task ->
    if (task.name == "preBuild") {
        task.dependsOn("bundleNdkLibcxx")
    }
}

dependencies {
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }

    implementation "androidx.swiperefreshlayout:swiperefreshlayout:1.0.0"

    implementation "com.google.android.gms:play-services-cast-framework:+"
}